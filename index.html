<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Self-Storage Revenue Pricing Control Tower</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="shell">
    <header class="masthead">
      <div>
        <p class="eyebrow">Revenue management operating artifact</p>
        <h1>Self-Storage Revenue Pricing Control Tower</h1>
        <p class="lede">A weekly pricing workflow for reviewing rate moves, occupancy risk, competitor position, field context, and source confidence across store markets.</p>
      </div>
      <aside class="review-card">
        <span>Review focus</span>
        <strong id="reviewFocus">Pricing queue</strong>
        <p id="reviewSummary">Loading recommendation summary.</p>
      </aside>
    </header>

    <section class="kpi-strip" id="kpiStrip" aria-label="Portfolio metrics"></section>

    <nav class="tabs" aria-label="Control tower views">
      <button class="tab is-active" type="button" data-tab="queue">Queue</button>
      <button class="tab" type="button" data-tab="signals">Market Signals</button>
      <button class="tab" type="button" data-tab="guardrails">Guardrails</button>
    </nav>

    <section id="app" class="surface" aria-live="polite"></section>
  </main>
  <script src="src/data.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
